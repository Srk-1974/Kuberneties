<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes GUI Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .status-running { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .status-pending { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .status-failed { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .log-container { 
            background: #1a1a1a; 
            color: #00ff00; 
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i data-lucide="container" class="w-8 h-8 text-blue-400"></i>
                    <h1 class="text-2xl font-bold text-white">Kubernetes GUI Manager</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="cluster-status" class="px-3 py-1 rounded-full text-sm font-medium bg-green-500 text-white">
                        Connected
                    </span>
                    <button onclick="refreshAll()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center space-x-2 transition">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        <span>Refresh</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
        <!-- Navigation Tabs -->
        <div class="flex space-x-1 mb-6 bg-gray-800 p-1 rounded-lg">
            <button onclick="switchTab('pods')" id="pods-tab" class="tab-btn flex-1 px-4 py-2 rounded-md text-sm font-medium transition bg-blue-600 text-white">
                <i data-lucide="box" class="w-4 h-4 inline mr-2"></i>Pods
            </button>
            <button onclick="switchTab('deployments')" id="deployments-tab" class="tab-btn flex-1 px-4 py-2 rounded-md text-sm font-medium transition text-gray-300 hover:bg-gray-700">
                <i data-lucide="package" class="w-4 h-4 inline mr-2"></i>Deployments
            </button>
            <button onclick="switchTab('services')" id="services-tab" class="tab-btn flex-1 px-4 py-2 rounded-md text-sm font-medium transition text-gray-300 hover:bg-gray-700">
                <i data-lucide="network" class="w-4 h-4 inline mr-2"></i>Services
            </button>
            <button onclick="switchTab('logs')" id="logs-tab" class="tab-btn flex-1 px-4 py-2 rounded-md text-sm font-medium transition text-gray-300 hover:bg-gray-700">
                <i data-lucide="file-text" class="w-4 h-4 inline mr-2"></i>Logs
            </button>
            <button onclick="switchTab('monitoring')" id="monitoring-tab" class="tab-btn flex-1 px-4 py-2 rounded-md text-sm font-medium transition text-gray-300 hover:bg-gray-700">
                <i data-lucide="activity" class="w-4 h-4 inline mr-2"></i>Monitor
            </button>
        </div>

        <!-- Pods Section -->
        <div id="pods-content" class="tab-content">
            <div class="bg-gray-800 rounded-lg p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold flex items-center">
                        <i data-lucide="box" class="w-5 h-5 mr-2 text-blue-400"></i>
                        Pods Management
                    </h2>
                    <div class="flex space-x-2">
                        <select id="namespace-select" class="bg-gray-700 text-white px-3 py-2 rounded-lg">
                            <option value="all">All Namespaces</option>
                        </select>
                        <button onclick="createPod()" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg flex items-center space-x-2 transition">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            <span>Create Pod</span>
                        </button>
                    </div>
                </div>
                <div id="pods-table" class="overflow-x-auto">
                    <!-- Pods table will be populated here -->
                </div>
            </div>
        </div>

        <!-- Deployments Section -->
        <div id="deployments-content" class="tab-content hidden">
            <div class="bg-gray-800 rounded-lg p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold flex items-center">
                        <i data-lucide="package" class="w-5 h-5 mr-2 text-green-400"></i>
                        Deployments Management
                    </h2>
                    <button onclick="createDeployment()" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg flex items-center space-x-2 transition">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>Create Deployment</span>
                    </button>
                </div>
                <div id="deployments-table" class="overflow-x-auto">
                    <!-- Deployments table will be populated here -->
                </div>
            </div>
        </div>

        <!-- Services Section -->
        <div id="services-content" class="tab-content hidden">
            <div class="bg-gray-800 rounded-lg p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold flex items-center">
                        <i data-lucide="network" class="w-5 h-5 mr-2 text-purple-400"></i>
                        Services Management
                    </h2>
                    <button onclick="createService()" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg flex items-center space-x-2 transition">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>Create Service</span>
                    </button>
                </div>
                <div id="services-table" class="overflow-x-auto">
                    <!-- Services table will be populated here -->
                </div>
            </div>
        </div>

        <!-- Logs Section -->
        <div id="logs-content" class="tab-content hidden">
            <div class="bg-gray-800 rounded-lg p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold flex items-center">
                        <i data-lucide="file-text" class="w-5 h-5 mr-2 text-yellow-400"></i>
                        Log Viewer
                    </h2>
                    <div class="flex space-x-2">
                        <select id="log-pod-select" class="bg-gray-700 text-white px-3 py-2 rounded-lg">
                            <option value="">Select Pod</option>
                        </select>
                        <button onclick="followLogs()" id="follow-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center space-x-2 transition">
                            <i data-lucide="play" class="w-4 h-4"></i>
                            <span>Follow</span>
                        </button>
                    </div>
                </div>
                <div id="log-container" class="log-container rounded-lg p-4 h-96 overflow-y-auto">
                    Select a pod to view logs...
                </div>
            </div>
        </div>

        <!-- Monitoring Section -->
        <div id="monitoring-content" class="tab-content hidden">
            <div class="bg-gray-800 rounded-lg p-6">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <i data-lucide="activity" class="w-5 h-5 mr-2 text-red-400"></i>
                    Cluster Monitoring
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                    <div class="bg-gray-700 rounded-lg p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-400 text-sm">Total Pods</p>
                                <p id="total-pods" class="text-2xl font-bold text-white">0</p>
                            </div>
                            <i data-lucide="box" class="w-8 h-8 text-blue-400"></i>
                        </div>
                    </div>
                    <div class="bg-gray-700 rounded-lg p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-400 text-sm">Running</p>
                                <p id="running-pods" class="text-2xl font-bold text-green-400">0</p>
                            </div>
                            <i data-lucide="check-circle" class="w-8 h-8 text-green-400"></i>
                        </div>
                    </div>
                    <div class="bg-gray-700 rounded-lg p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-400 text-sm">Pending</p>
                                <p id="pending-pods" class="text-2xl font-bold text-yellow-400">0</p>
                            </div>
                            <i data-lucide="clock" class="w-8 h-8 text-yellow-400"></i>
                        </div>
                    </div>
                    <div class="bg-gray-700 rounded-lg p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-400 text-sm">Failed</p>
                                <p id="failed-pods" class="text-2xl font-bold text-red-400">0</p>
                            </div>
                            <i data-lucide="x-circle" class="w-8 h-8 text-red-400"></i>
                        </div>
                    </div>
                </div>
                <div id="resource-usage" class="bg-gray-700 rounded-lg p-4">
                    <h3 class="text-lg font-semibold mb-3">Resource Usage</h3>
                    <div id="resource-charts">
                        <!-- Resource charts will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Actions -->
    <div id="action-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg p-6 w-full max-w-md">
            <h3 id="modal-title" class="text-lg font-semibold mb-4"></h3>
            <div id="modal-content"></div>
            <div class="flex justify-end space-x-2 mt-4">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg transition">Cancel</button>
                <button id="modal-confirm" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // Inline createPod function - guaranteed to work
        function createPod() {
            const modalContent = `
                <div class="space-y-4">
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2 text-white">Pod Name</label>
                        <input type="text" id="pod-name" class="w-full px-3 py-2 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500" placeholder="my-pod" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2 text-white">Container Image</label>
                        <input type="text" id="pod-image" class="w-full px-3 py-2 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500" placeholder="nginx:latest" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2 text-white">Namespace</label>
                        <select id="pod-namespace" class="w-full px-3 py-2 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500">
                            <option value="default">default</option>
                            <option value="development">development</option>
                            <option value="production">production</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2 text-white">Port</label>
                        <input type="number" id="pod-port" class="w-full px-3 py-2 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500" placeholder="80" value="80">
                    </div>
                </div>
            `;
            
            document.getElementById('modal-title').textContent = 'Create Pod';
            document.getElementById('modal-content').innerHTML = modalContent;
            document.getElementById('action-modal').classList.remove('hidden');
            
            document.getElementById('modal-confirm').onclick = function() {
                const podName = document.getElementById('pod-name').value;
                const podImage = document.getElementById('pod-image').value;
                const podNamespace = document.getElementById('pod-namespace').value;
                const podPort = document.getElementById('pod-port').value;
                
                if (!podName || !podImage) {
                    alert('Pod name and image are required');
                    return;
                }
                
                alert('Creating pod: ' + podName + ' with image: ' + podImage + ' in namespace: ' + podNamespace);
                
                // Close modal
                document.getElementById('action-modal').classList.add('hidden');
                
                // Add to pod table directly (mock creation)
                const podTable = document.getElementById('pods-table');
                const currentContent = podTable.innerHTML;
                const newPodRow = `
                    <tr class="hover:bg-gray-700 transition">
                        <td class="px-4 py-3 font-medium text-white">${podName}</td>
                        <td class="px-4 py-3 text-white">${podNamespace}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 rounded-full text-xs font-medium bg-green-500 text-white">Running</span>
                        </td>
                        <td class="px-4 py-3 text-white">1/1</td>
                        <td class="px-4 py-3 text-white">0</td>
                        <td class="px-4 py-3 text-white">0s</td>
                        <td class="px-4 py-3">
                            <div class="flex space-x-2">
                                <button onclick="alert('Pod ${podName} described')" class="p-1 hover:bg-gray-600 rounded" title="Describe">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-blue-400"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                                </button>
                                <button onclick="alert('Pod ${podName} restarted')" class="p-1 hover:bg-gray-600 rounded" title="Restart">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"></path></svg>
                                </button>
                                <button onclick="this.closest('tr').remove(); alert('Pod ${podName} deleted')" class="p-1 hover:bg-gray-600 rounded text-red-400" title="Delete">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                
                // Insert into table
                if (currentContent.includes('<table')) {
                    podTable.querySelector('tbody').insertAdjacentHTML('beforeend', newPodRow);
                } else {
                    // If no table yet, create it
                    podTable.innerHTML = `
                        <table class="w-full text-sm">
                            <thead class="bg-gray-700">
                                <tr>
                                    <th class="px-4 py-3 text-left text-white">Name</th>
                                    <th class="px-4 py-3 text-left text-white">Namespace</th>
                                    <th class="px-4 py-3 text-left text-white">Status</th>
                                    <th class="px-4 py-3 text-left text-white">Ready</th>
                                    <th class="px-4 py-3 text-left text-white">Restarts</th>
                                    <th class="px-4 py-3 text-left text-white">Age</th>
                                    <th class="px-4 py-3 text-left text-white">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-600">
                                ${newPodRow}
                            </tbody>
                        </table>
                    `;
                }
            };
        }
        
        // Inline closeModal function
        function closeModal() {
            document.getElementById('action-modal').classList.add('hidden');
        }
        
        console.log('Inline functions loaded successfully');
    </script>
    <script src="app.js"></script>
</body>
</html>
